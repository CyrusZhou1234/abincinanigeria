<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abinci Na Nigeria | Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <div class="navbar">
        <div class="logo"><a href="index.html">Abinci Na Nigeria</a></div>
        <audio controls autoplay loop>
        <source src="PRAY.mp3">
        Your browser does not support the audio element. 
    </audio>
        <div class="dropdown">
            <button class="dropbtn">Menu</button>
            <div class="dropdown-content">
                <a href="index.html">Home</a>
                <a href="menu.html">Food Menu</a>
                <a href="photos.html">Photo Gallery</a>
                <a href="hours.html">Opening Hours</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
        <div class="login">
            <button class="loginbtn"><a href="login.html"><img src="https://cdn-icons-png.freepik.com/256/16385/16385147.png?semt=ais_white_label" alt="Login"></a></button>
        </div>
    </div>




    <div class="contact-container">
        <h1>Contact Us</h1>
        <p>We would love to hear from you! Reach out using any of the details below.</p>

        <div class="contact-info">
            <h2>📍 Our Headquarters</h2>
            <p>123 Lagos Crescent,<br>Abuja, Nigeria</p>

            <h2>📞 Phone</h2>
            <p>+234 810 555 9090</p>

            <h2>📧 Email</h2>
            <p>support@abincinanigeria.com</p>
        </div>

        <div>
            <h2>Send Us a Message</h2>
            <form class="message">
                <div class="message-group">
                <label for="name">Name:</label>
                <input type="text" required>
                </div>
                <br>
                <div class="message-group">
                <label for="email">Email:</label>
                <input type="email" required>
                </div>
                <br>
                <div class="message-group">
                <label for="message">Message:</label>
                <textarea rows="5" required></textarea>
                </div>
                <br>
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
